<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charades Draw & Guess</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  🎭 Draw & Guess Charades
</header>

<div class="layout">

  <!-- LEFT: CANVAS -->
  <div class="panel">
    <div class="card">
      <h3>Drawing Area</h3>
      <canvas id="canvas"></canvas>

      <div class="toolbar">
        <button onclick="clearCanvas()" class="btn-danger">Clear</button>
        <button onclick="requestWord()" class="btn-primary">Start Round</button>
      </div>

      <div id="wordBox" class="word-box">Waiting for word...</div>
    </div>
  </div>

  <!-- RIGHT: CHAT + PLAYERS -->
  <div class="panel">

    <div class="card">
      <h3>Players</h3>
      <div id="players"></div>
    </div>

    <div class="card">
      <h3>Chat / Guess</h3>

      <div id="chat" class="chat"></div>

      <input id="msg" placeholder="Guess the word..." />
      <button onclick="sendGuess()" class="btn-secondary">Send</button>
    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
