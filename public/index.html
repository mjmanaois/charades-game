<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charades Game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  🎭 Charades Game
</header>

<div class="container">

  <!-- Word Section -->
  <div class="card">
    <div class="word-box" id="word">Waiting for word...</div>

    <button class="btn-primary" onclick="getWord()">Get Word</button>
    <button class="btn-secondary" onclick="startGame()">Start Game</button>
  </div>

  <!-- Players -->
  <div class="card">
    <h3>Players</h3>
    <div id="players" class="players"></div>
  </div>

  <!-- Chat -->
  <div class="card">
    <h3>Chat</h3>

    <div id="chat" class="chat-box"></div>

    <input id="msg" placeholder="Type message..." />
    <button class="btn-secondary" onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- Socket.io -->
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
